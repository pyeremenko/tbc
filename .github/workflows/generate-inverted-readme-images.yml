name: Generate inverted README images

on:
  push:
    branches:
      - main
    paths:
      - "tbc-*.svg"
      - ".github/workflows/generate-inverted-readme-images.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin imagemagick

      - name: Generate inverted PNG images
        run: |
          mkdir -p readme

          for file in tbc-logo.svg tbc-00.svg tbc-01.svg tbc-en.svg; do
            name="${file%.svg}"

            rsvg-convert "$file" -o "/tmp/${name}.png"

            magick "/tmp/${name}.png" \
              -channel RGB -negate +channel \
              "readme/${name}-inverted.png"
          done

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add readme/*-inverted.png

          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Generate inverted README images"
            git push
          fi